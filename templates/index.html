<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CostPredict | Mobile Scope Builder</title>
    <style>
        :root {
            --cp-blue: #23408A;
            --cp-yellow: #FFC113;
            --cp-bg: #f8fafc;
            --cp-text: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--cp-bg);
            color: var(--cp-text);
            margin: 0;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            max-width: 540px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header-banner {
            background: #ffffff; 
            padding: 16px;
            border-radius: 12px;
            border-bottom: 4px solid var(--cp-blue); 
            box-shadow: 0 4px 12px rgba(35, 64, 138, 0.04);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .brand-logo {
            height: 42px; 
            width: auto;
            max-width: 90%;
            object-fit: contain;
            display: block;
        }

        .tagline { 
            font-size: 10px; 
            font-weight: 700;
            color: var(--cp-blue); 
            letter-spacing: 1.75px; 
            margin-top: 8px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(35, 64, 138, 0.04);
            border: 1px solid #e2e8f0;
        }

        .results-card {
            display: none; 
            border-top: 4px solid var(--cp-blue);
        }

        h2 { color: var(--cp-blue); font-size: 16px; margin-top: 0; margin-bottom: 16px; border-bottom: 2px solid #f1f5f9; padding-bottom: 6px; font-weight: 700;}
        h2.section-break { margin-top: 12px; }

        .form-group { margin-bottom: 14px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }

        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.8rem; color: #475569; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: #ffffff;
            color: var(--cp-text);
            transition: border-color 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--cp-blue); }

        .search-input {
            border-color: #94a3b8;
            background-color: #f8fafc;
            margin-bottom: 8px;
        }

        button.btn-primary { 
            width: 100%; 
            background: var(--cp-blue); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            text-transform: uppercase; 
            margin-top: 8px;
        }
        
        button.btn-secondary { 
            background: var(--cp-yellow); 
            color: var(--cp-blue); 
            border: none; 
            padding: 16px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            text-transform: uppercase; 
            width: 100%; 
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(255, 193, 19, 0.2);
        }

        .component-item { 
            border-left: 4px solid var(--cp-blue); 
            background: #f8fafc; 
            padding: 12px; 
            margin-bottom: 8px; 
            border-radius: 4px; 
            font-size: 0.85rem; 
        }
        .component-meta { font-size: 0.75rem; color: #64748b; margin-top: 3px; }
        
        .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #e2e8f0; font-size: 0.9rem; }
        .grand-total { font-size: 1.15rem; font-weight: bold; color: var(--cp-blue); border-top: 2px solid var(--cp-blue); padding-top: 10px; margin-top: 8px; }
        
        .footer-note { text-align: center; font-size: 10px; color: #94a3b8; margin: 15px 0 10px 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-banner">
        <img src="/static/logo.png" alt="CostPredict" class="brand-logo">
        <div class="tagline">PRICING MADE PREDICTIVE</div>
    </div>

    <div class="card">
        <h2>Step 1. Project Description</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Project Type</label>
                <select id="project_type">
                    <option value="Residential">Residential</option>
                    <option value="Commercial">Commercial</option>
                    <option value="Mixed-Use">Mixed-Use</option>
                    <option value="Industrial">Industrial</option>
                </select>
            </div>
            <div class="form-group">
                <label>Project Location</label>
                <input type="text" id="location" placeholder="e.g. Chicago, IL" value="Chicago, IL">
            </div>
        </div>
        <div class="form-group">
            <label>Est. Start Date</label>
            <input type="date" id="start_date">
        </div>

        <h2 class="section-break">Step 2. Project Details</h2>
        
        <div class="form-group">
            <label>Search Category / Material</label>
            <input type="text" id="category_search" class="search-input" placeholder="Type to filter e.g. Flooring, Cabinets..." onkeyup="filterCategories()">
        </div>

        <div class="form-group">
            <label>Main Material Category (Menu)</label>
            <select id="main_category" onchange="updateSubcategories()">
                <option value="" disabled selected>Select category...</option>
                <option value="GeneralConditions">Project Setup & Supervision</option>
                <option value="Concrete">Concrete & Foundation Work</option>
                <option value="Masonry">Brick & Concrete Block Work</option>
                <option value="Metals">Structural Steel & Iron Work</option>
                <option value="WoodPlasticComposites">Wood Framing & Structural Panels</option>
                <option value="ThermalMoistureProtection">Insulation & Roofing Membranes</option>
                <option value="Openings">Doors & Windows</option>
                <option value="Finishes">Drywall, Flooring & Wall Finishes</option>
                <option value="Specialties">Specialties & Equipment Compartments</option>
                <option value="ConveyingEquipment">Elevators & Lifts</option>
            </select>
        </div>
        <div class="form-group">
            <label>Exact Material Subcategory (Table Item)</label>
            <select id="sub_category" disabled>
                <option value="">Select main category first...</option>
            </select>
        </div>
        <div class="form-group">
            <label>Quantity Needed (e.g. 1,200 sqft)</label>
            <input type="number" id="quantity" pattern="[0-9]*" inputmode="numeric" placeholder="Enter number quantity" min="1">
        </div>
        <div class="form-group">
            <label>Is Labor Required?</label>
            <select id="labor_required">
                <option value="Yes">Yes (Include Labor)</option>
                <option value="No">No (Material Only)</option>
            </select>
        </div>

        <button class="btn-primary" onclick="addComponent()">Add to Project</button>
    </div>

    <div class="card results-card" id="results_panel">
        <h2>Live Bill of Quantities</h2>
        <div id="components_list" style="margin-bottom: 20px;"></div>

        <h2>On-Screen Cost Evaluation</h2>
        <div class="summary-row"><span>Material Base Subtotal:</span><span id="lbl_mat">$0.00</span></div>
        <div class="summary-row"><span>Labor Assembly Subtotal:</span><span id="lbl_lab">$0.00</span></div>
        <div class="summary-row"><span>Regional Tax (10.25%):</span><span id="lbl_tax">$0.00</span></div>
        <div class="summary-row grand-total"><span>Project Estimation:</span><span id="lbl_total">$0.00</span></div>

        <form id="pdf_form" action="/generate" method="post">
            <input type="hidden" name="payload" id="payload_input">
            <button type="submit" class="btn-secondary">Export Verified PDF Report</button>
        </form>
    </div>
    
    <div class="footer-note">CostPredict Engine v2.5 © 2026</div>
</div>

<script>
    // Unified Matrix Mapping back to descriptive categories
    const dataMatrix = {
        "GeneralConditions": {
            "Project Management & Supervision": { mat: 0.00, lab: 85.00, code: "01 31 00", unit: "HR" },
            "Temporary Facilities & Utilities": { mat: 450.00, lab: 120.00, code: "01 50 00", unit: "MTH" },
            "Final Site Post-Construction Cleanup": { mat: 75.00, lab: 180.00, code: "01 74 13", unit: "DAY" }
        },
        "Concrete": {
            "4000 PSI Ready-Mix Foundation Concrete": { mat: 145.00, lab: 95.00, code: "03 30 00", unit: "CY" },
            "Grade 60 #4 Welded Wire Mesh Sheeting": { mat: 0.45, lab: 0.60, code: "03 22 00", unit: "SF" },
            "Concrete Formwork Assemblies": { mat: 3.25, lab: 5.50, code: "03 11 00", unit: "SF" }
        },
        "Masonry": {
            "8\"x8\"x16\" Standard Concrete CMU Block": { mat: 2.85, lab: 6.50, code: "04 22 00", unit: "PCS" },
            "Modular Exterior Face Brick": { mat: 0.95, lab: 2.25, code: "04 21 13", unit: "PCS" },
            "Type S High-Strength Masonry Mortar": { mat: 14.50, lab: 0.00, code: "04 05 13", unit: "BAGS" }
        },
        "Metals": {
            "W10x22 Structural Steel Wide-Flange Beam": { mat: 48.00, lab: 35.00, code: "05 12 00", unit: "LNFT" },
            "#4 Deformed Grade 60 Reinforcing Rebar": { mat: 11.25, lab: 8.00, code: "03 21 00", unit: "LNFT" },
            "Metal Decking Open-Web Joists": { mat: 6.50, lab: 4.75, code: "05 21 00", unit: "SF" }
        },
        "WoodPlasticComposites": {
            "2x4x8 Standard Dimensional Stud Framing": { mat: 4.25, lab: 3.15, code: "06 11 00", unit: "BF" },
            "2x6x16 Premium Structural Rafter Framing": { mat: 12.50, lab: 5.50, code: "06 11 10", unit: "BF" },
            "3/4\" OSB Tongue & Groove Subfloor": { mat: 28.00, lab: 14.50, code: "06 16 23", unit: "SF" }
        },
        "ThermalMoistureProtection": {
            "R-13 Kraft Faced Fiberglass Insulation Batt": { mat: 0.75, lab: 0.65, code: "07 21 16", unit: "SF" },
            "4-Mil Polyethylene Interior Vapor Barrier": { mat: 0.15, lab: 0.20, code: "07 26 00", unit: "SF" },
            "Commercial Grade Elastomeric Roof Membrane": { mat: 4.50, lab: 6.00, code: "07 50 00", unit: "SF" }
        },
        "Openings": {
            "36\"x80\" Solid Core Flush Wood Interior Door": { mat: 185.00, lab: 110.00, code: "08 14 16", unit: "PCS" },
            "3'0\" x 4'0\" Insulated Vinyl Windows": { mat: 245.00, lab: 135.00, code: "08 51 13", unit: "PCS" }
        },
        "Finishes": {
            "1/2\" Standard Gypsum Drywall Board": { mat: 0.65, lab: 1.85, code: "09 29 00", unit: "SF" },
            "5/8\" Fire-Rated Type X Gypsum Board": { mat: 0.85, lab: 2.10, code: "09 29 13", unit: "SF" },
            "Commercial Grade Luxury Vinyl Plank (LVP) Flooring": { mat: 3.50, lab: 2.50, code: "09 65 19", unit: "SF" },
            "Premium Porcelain Interior Floor Tile": { mat: 5.50, lab: 7.00, code: "09 30 13", unit: "SF" }
        },
        "Specialties": {
            "Visual Display Markerboards": { mat: 120.00, lab: 45.00, code: "10 11 00", unit: "PCS" },
            "Solid Phenolic Toilet Compartments / Cabinets": { mat: 450.00, lab: 180.00, code: "10 21 13", unit: "PCS" }
        },
        "ConveyingEquipment": {
            "Hydraulic Passenger Elevator (3-Stop)": { mat: 65000.00, lab: 22000.00, code: "14 24 00", unit: "EA" }
        }
    };

    let originalOptions = [];
    window.addEventListener('DOMContentLoaded', () => {
        const select = document.getElementById('main_category');
        originalOptions = Array.from(select.options);
    });

    function filterCategories() {
        const text = document.getElementById('category_search').value.toLowerCase();
        const select = document.getElementById('main_category');
        
        select.innerHTML = '';
        let matched = originalOptions.filter(opt => opt.text.toLowerCase().includes(text) || opt.value === "");
        
        matched.forEach(opt => select.appendChild(opt));
        if (matched.length > 1 && select.selectedIndex <= 0) {
            select.disabled = false;
        }
    }

    let projectScope = [];

    function updateSubcategories() {
        const mainCat = document.getElementById('main_category').value;
        const subSelect = document.getElementById('sub_category');
        subSelect.innerHTML = '';
        subSelect.disabled = false;

        if(!dataMatrix[mainCat]) return;

        Object.keys(dataMatrix[mainCat]).forEach(sub => {
            let opt = document.createElement('option');
            opt.value = sub;
            opt.innerHTML = sub;
            subSelect.appendChild(opt);
        });
    }

    function addComponent() {
        const main = document.getElementById('main_category').value;
        const sub = document.getElementById('sub_category').value;
        const qty = parseFloat(document.getElementById('quantity').value);
        const laborReq = document.getElementById('labor_required').value === "Yes";

        if (!main || !sub || isNaN(qty) || qty <= 0) {
            alert("Please input a valid quantity.");
            return;
        }

        const baseline = dataMatrix[main][sub];
        let lineItems = [];
        
        let wasteFactor = (main === "Concrete" || main === "Masonry" || sub.includes("Tile")) ? 1.15 : 1.10;
        let finalQty = Math.ceil(qty * wasteFactor);

        lineItems.push({
            code: baseline.code,
            desc: sub,
            qty: finalQty,
            unit: baseline.unit,
            mat_cost: finalQty * baseline.mat,
            lab_cost: laborReq ? (finalQty * baseline.lab) : 0
        });

        if (sub.includes("LVP")) {
            let tstrips = Math.max(1, Math.ceil(qty / 300));
            lineItems.push({ code: "09 65 13", desc: "Matching T-Mold Transitions", qty: tstrips, unit: "PCS", mat_cost: tstrips * 45, lab_cost: laborReq ? (tstrips * 25) : 0 });
        } else if (sub.includes("Tile")) {
            let thinset = Math.max(1, Math.ceil(qty / 60));
            lineItems.push({ code: "09 30 05", desc: "Polymer Thinset Mortar (50lb)", qty: thinset, unit: "BAGS", mat_cost: thinset * 32, lab_cost: 0 });
        }

        projectScope.push(...lineItems);
        renderProjectState();
        
        document.getElementById('quantity').value = '';
        document.getElementById('category_search').value = '';
        filterCategories(); 
        
        const resultsPanel = document.getElementById('results_panel');
        resultsPanel.style.display = 'block';
        resultsPanel.scrollIntoView({ behavior: 'smooth' });
    }

    function renderProjectState() {
        const listDiv = document.getElementById('components_list');
        listDiv.innerHTML = '';
        let totalMat = 0, totalLab = 0;

        projectScope.forEach(item => {
            totalMat += item.mat_cost;
            totalLab += item.lab_cost;

            let div = document.createElement('div');
            div.className = 'component-item';
            div.innerHTML = `
                <div style="font-weight:700;">${item.desc} <span style="float:right; font-family:monospace; color:#64748b; font-size:11px;">${item.code}</span></div>
                <div class="component-meta">Qty: ${item.qty} ${item.unit} | Mat: $${item.mat_cost.toFixed(2)} | Lab: $${item.lab_cost.toFixed(2)}</div>
            `;
            listDiv.appendChild(div);
        });

        let taxRate = document.getElementById('location').value.includes("Chicago") ? 0.1025 : 0.08;
        let computedTax = totalMat * taxRate;
        let grandTotal = totalMat + totalLab + computedTax;

        document.getElementById('lbl_mat').innerHTML = `$${totalMat.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        document.getElementById('lbl_lab').innerHTML = `$${totalLab.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        document.getElementById('lbl_tax').innerHTML = `$${computedTax.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        document.getElementById('lbl_total').innerHTML = `$${grandTotal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

        const fullPayload = {
            metadata: {
                project_type: document.getElementById('project_type').value,
                location: document.getElementById('location').value,
                start_date: document.getElementById('start_date').value
            },
            line_items: projectScope,
            totals: { mat: totalMat, lab: totalLab, tax: computedTax, grand: grandTotal }
        };

        document.getElementById('payload_input').value = JSON.stringify(fullPayload);
    }
</script>
</body>
</html>
