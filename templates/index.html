<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CostPredict - Contractor Predictive Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-brand-blue { background-color: #23408A; }
        .text-brand-blue { color: #23408A; }
        .bg-brand-yellow { background-color: #FFC113; }
        .border-brand-yellow { border-color: #FFC113; }
        .border-brand-blue { border-color: #23408A; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white py-6 shadow-sm border-b-4 border-brand-yellow">
        <div class="max-w-5xl mx-auto px-4 flex flex-col items-center">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="CostPredict Logo" class="h-16 w-auto mb-2" onerror="this.src='https://via.placeholder.com/150x50?text=Logo'">
            <p class="text-brand-blue font-bold text-lg tracking-wide uppercase">Contractor Predictive Pricing</p>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto w-full p-4 md:p-8">
        <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border border-gray-200">
            
            <form id="estimate-form">
                <section class="mb-8">
                    <h2 class="text-2xl font-bold text-brand-blue mb-6 border-b-2 border-brand-yellow pb-2">Project Information</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Project Type</label>
                            <select id="project-type" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-brand-blue outline-none">
                                <option value="Residential">Residential</option>
                                <option value="Commercial">Commercial</option>
                                <option value="Mixed-Use">Mixed-Use</option>
                                <option value="Industrial">Industrial</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Project Zip Code</label>
                            <input type="text" id="zip-code" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-brand-blue outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Project Start Date</label>
                            <input type="date" id="start-date" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-brand-blue outline-none" required>
                        </div>
                    </div>
                </section>

                <section class="mb-8">
                    <h2 class="text-2xl font-bold text-brand-blue mb-6 border-b-2 border-brand-yellow pb-2">Material & Labor Specifications</h2>
                    <div id="materials-container"></div>
                    <button type="button" onclick="addMaterialRow()" class="mt-4 bg-gray-100 text-brand-blue font-bold px-6 py-3 rounded-lg hover:bg-brand-yellow transition">
                        + Add Material Item
                    </button>
                </section>

                <button type="submit" class="w-full bg-brand-blue text-white font-bold py-4 rounded-lg hover:bg-blue-900 transition shadow-lg text-lg">
                    Generate Predictive Pricing Report
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-brand-blue text-white py-6 mt-8">
        <div class="max-w-5xl mx-auto px-4 text-center text-sm">
            &copy; 2026 CostPredict Engine. All rights reserved. Precision pricing for professional contractors.
        </div>
    </footer>

    <script>
        let goldenCatalog = {};

        // Load Catalog
        document.addEventListener('DOMContentLoaded', async () => {
            const response = await fetch('/api/catalog');
            goldenCatalog = await response.json();
            addMaterialRow();
        });

        function addMaterialRow() {
            const container = document.getElementById('materials-container');
            const rowId = 'row-' + Date.now();
            
            const rowHtml = `
                <div id="${rowId}" class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end mb-6 p-4 border border-gray-100 bg-gray-50 rounded-lg relative">
                    <button type="button" onclick="document.getElementById('${rowId}').remove()" class="absolute top-0 right-2 text-red-500 font-bold">×</button>
                    <div class="col-span-12 md:col-span-4">
                        <label class="block text-xs font-bold text-gray-500 uppercase">Main Material Category</label>
                        <select class="main-cat-input w-full p-2 border rounded" required>
                            <option value="">Select Category...</option>
                            ${Object.keys(goldenCatalog).map(c => `<option value="${c}">${c}</option>`).join('')}
                        </select>
                    </div>
                    <div class="col-span-12 md:col-span-4">
                        <label class="block text-xs font-bold text-gray-500 uppercase">Material Subcategory</label>
                        <select class="sub-cat-input w-full p-2 border rounded" required disabled>
                            <option>Select Main First...</option>
                        </select>
                    </div>
                    <div class="col-span-6 md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase">Qty</label>
                        <input type="number" class="qty-input w-full p-2 border rounded" placeholder="0" required>
                    </div>
                    <div class="col-span-6 md:col-span-2 flex items-center h-10">
                        <input type="checkbox" class="labor-input mr-2"> <label class="text-sm font-bold">Include Labor</label>
                    </div>
                    <input type="hidden" class="waste-input" value="0">
                </div>
            `;
            container.insertAdjacentHTML('beforeend', rowHtml);

            // Populate Subcategories
            const row = document.getElementById(rowId);
            const mainSelect = row.querySelector('.main-cat-input');
            const subSelect = row.querySelector('.sub-cat-input');

            mainSelect.addEventListener('change', function() {
                const items = goldenCatalog[this.value] || [];
                subSelect.innerHTML = items.map(i => `<option value="${i.name}" data-waste="${i.default_waste}">${i.name}</option>`).join('');
                subSelect.disabled = false;
                row.querySelector('.waste-input').value = items.length ? items[0].default_waste : 0;
            });
        }

        // Handle Submission
        document.getElementById('estimate-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = "Generating...";

            const payload = {
                project_info: {
                    projectType: document.getElementById('project-type').value,
                    zipCode: document.getElementById('zip-code').value,
                    startDate: document.getElementById('start-date').value
                },
                materials: Array.from(document.querySelectorAll('.grid.gap-4')).map(row => ({
                    category: row.querySelector('.main-cat-input').value,
                    subcategory: row.querySelector('.sub-cat-input').value,
                    quantity: parseFloat(row.querySelector('.qty-input').value) || 0,
                    waste: parseFloat(row.querySelector('.waste-input').value) || 0,
                    labor: row.querySelector('.labor-input').checked
                }))
            };

            const response = await fetch('/api/report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const blob = await response.blob();
                window.open(URL.createObjectURL(blob), '_blank');
            } else {
                alert('Error generating report.');
            }
            submitBtn.disabled = false;
            submitBtn.textContent = "Generate Predictive Pricing Report";
        });
    </script>
</body>
</html>
