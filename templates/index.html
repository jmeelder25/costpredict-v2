<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Estimator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .animate-pulse-score { animation: pulse 0.5s ease-in-out; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen font-sans">

    <header class="bg-slate-800 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <h1 class="text-2xl font-bold tracking-wide">Project Estimator</h1>
            <div class="text-right">
                <p class="text-xs text-slate-300 uppercase tracking-wider">Est. Complexity</p>
                <p id="confidenceScore" class="text-2xl font-bold text-green-400">0</p>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
        <div id="catalog-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            </div>
        
        <div class="mt-8 flex gap-4">
            <button onclick="downloadPDF()" class="bg-green-600 hover:bg-green-500 text-white px-8 py-3 rounded-lg font-bold shadow-lg transition">
                Download PDF Report
            </button>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-6 text-center text-sm mt-auto">
        &copy; 2026 Construction Management System.
    </footer>

    <script>
        // Load Catalog and Restore Persistence
        async function loadCatalog() {
            const res = await fetch('/api/catalog');
            const data = await res.json();
            const grid = document.getElementById('catalog-grid');
            const savedState = JSON.parse(localStorage.getItem('project_state') || '{}');

            for (const [cat, items] of Object.entries(data)) {
                let html = `<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                <h3 class="text-xl font-bold text-slate-800 mb-4 border-b pb-2">${cat.replace(/-/g, ' ')}</h3>`;
                items.forEach((item, idx) => {
                    const id = `${cat}-${idx}`;
                    const val = savedState[id] || 0;
                    html += `
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-700">${item.name}</label>
                            <input type="number" step="0.1" id="${id}" value="${val}" data-name="${item.name}" 
                                class="w-full mt-1 border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                                oninput="updateState()">
                        </div>`;
                });
                grid.innerHTML += html + `</div>`;
            }
        }

        // Persistence Logic
        function updateState() {
            const inputs = document.querySelectorAll('input');
            let state = {};
            inputs.forEach(i => state[i.id] = i.value);
            localStorage.setItem('project_state', JSON.stringify(state));
            
            // Trigger score update animation
            const el = document.getElementById('confidenceScore');
            el.classList.add('animate-pulse-score');
            setTimeout(() => el.classList.remove('animate-pulse-score'), 500);
        }

        // PDF Generation Workflow
        async function downloadPDF() {
            const inputs = Array.from(document.querySelectorAll('input')).filter(i => parseFloat(i.value) > 0);
            const payload = inputs.map(i => ({ name: i.dataset.name, total_material_needed: i.value }));
            
            const res = await fetch('/api/report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "estimate.pdf";
            a.click();
        }

        document.addEventListener('DOMContentLoaded', loadCatalog);
    </script>
</body>
</html>
