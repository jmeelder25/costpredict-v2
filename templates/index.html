<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CostPredict Dashboard</title>
    </head>
<body>

    <div class="container">
        <div class="form-group">
            <input type="text" id="category_search" placeholder="Search Category..." onkeyup="filterCategories()" onclick="showCategories()">
            <div id="category_suggestions" class="suggestions"></div>
        </div>

        <div class="form-group">
            <input type="text" id="subcategory_search" placeholder="Select a category first..." onkeyup="filterSubcategories()" onclick="showSubcategories()" disabled>
            <div id="subcategory_suggestions" class="suggestions"></div>
        </div>

        <input type="number" id="quantity" placeholder="Quantity">
        <button onclick="processComponentIntent()">Add to Project</button>

        <div id="results_panel" style="display:none;">
            <div id="components_list"></div>
            <div id="totals">
                <span id="lbl_total_min"></span>
                <span id="lbl_total_avg"></span>
                <span id="lbl_total_max"></span>
            </div>
        </div>
    </div>

    <input type="hidden" id="payload_input" name="payload_input">

    <script>
        const rawData = {{ master_data | tojson | safe }} || {};
        const masterDataFile = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
        
        let normalizedCatalog = [];
        let projectScope = [];
        let activeCategoryKey = "";

        function getCostVal(obj, keys, defaultVal) {
            for (let k of keys) {
                if (obj[k] !== undefined && obj[k] !== null && obj[k] !== "") {
                    const parsed = parseFloat(obj[k]);
                    if (!isNaN(parsed)) return parsed;
                }
            }
            return defaultVal;
        }

        function initializeDataNormalization() {
            let rawItems = [];
            if (Array.isArray(masterDataFile)) {
                rawItems = masterDataFile;
            } else {
                const vals = Object.values(masterDataFile);
                if (vals.length > 0 && typeof vals[0] === 'object') {
                    const firstInnerVal = Object.values(vals[0])[0];
                    if (typeof firstInnerVal === 'string' || typeof firstInnerVal === 'number') {
                        let rowCount = Object.keys(vals[0]).length;
                        let columnNames = Object.keys(masterDataFile);
                        for(let i=0; i<rowCount; i++) {
                            let rowKey = Object.keys(vals[0])[i];
                            let newRow = {};
                            columnNames.forEach(col => { newRow[col] = masterDataFile[col][rowKey]; });
                            rawItems.push(newRow);
                        }
                    } else { rawItems = vals; }
                }
            }

            if (rawItems.length === 0) return;

            let sampleRow = rawItems[0];
            let allKeys = Object.keys(sampleRow);
            let validKeys = allKeys.filter(k => {
                let low = k.toLowerCase();
                return !low.includes('unnamed') && low !== 'id' && low !== 'index';
            });

            let catKey = validKeys.find(k => /cat|trade|division|main|group|type|class/i.test(k)) || validKeys[0];
            let remainingKeys = validKeys.filter(k => k !== catKey);
            let subKey = remainingKeys.find(k => /sub|desc|item|name|material|specific|detail/i.test(k)) || remainingKeys[0];
            let codeKey = validKeys.find(k => /code|csi/i.test(k));
            let unitKey = validKeys.find(k => /unit|uom|measure/i.test(k));

            normalizedCatalog = rawItems.map(item => {
                return {
                    category: String(item[catKey] || "").trim(),
                    subcategory: String(item[subKey] || "").trim(),
                    code: codeKey ? String(item[codeKey] || "00-0000").trim() : "00-0000",
                    unit: unitKey ? String(item[unitKey] || "EA").trim() : "EA",
                    min_mat: getCostVal(item, ['min_mat', 'mat_min', 'MinMat'], 35.0),
                    avg_mat: getCostVal(item, ['avg_mat', 'mat_avg', 'AvgMat'], 45.0),
                    max_mat: getCostVal(item, ['max_mat', 'mat_max', 'MaxMat'], 60.0),
                    min_lab: getCostVal(item, ['min_lab', 'lab_min', 'MinLab'], 25.0),
                    avg_lab: getCostVal(item, ['avg_lab', 'lab_avg', 'AvgLab'], 35.0),
                    max_lab: getCostVal(item, ['max_lab', 'lab_max', 'MaxLab'], 45.0)
                };
            }).filter(item => item.category !== "" && item.category !== "undefined" && item.subcategory !== "");
        }

        window.addEventListener('DOMContentLoaded', initializeDataNormalization);

        function showCategories() {
            const container = document.getElementById('category_suggestions');
            container.innerHTML = '';
            const uniqueCategories = [...new Set(normalizedCatalog.map(item => item.category))].sort();
            uniqueCategories.forEach(cat => {
                let div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = cat;
                div.onclick = () => selectCategory(cat);
                container.appendChild(div);
            });
            container.style.display = 'block';
        }

        function selectCategory(catKey) {
            activeCategoryKey = catKey;
            document.getElementById('category_search').value = catKey;
            document.getElementById('category_suggestions').style.display = 'none';
            document.getElementById('subcategory_search').disabled = false;
        }

        function filterSubcategories() {
            if (!activeCategoryKey) return;
            const query = document.getElementById('subcategory_search').value.toLowerCase();
            const container = document.getElementById('subcategory_suggestions');
            container.innerHTML = '';
            const subs = normalizedCatalog.filter(item => item.category === activeCategoryKey).map(item => item.subcategory);
            [...new Set(subs)].sort().forEach(item => {
                if (item.toLowerCase().includes(query)) {
                    let div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = item;
                    div.onclick = () => selectSubcategory(item);
                    container.appendChild(div);
                }
            });
            container.style.display = 'block';
        }

        function selectSubcategory(itemValue) {
            document.getElementById('subcategory_search').value = itemValue;
            document.getElementById('subcategory_suggestions').style.display = 'none';
        }

        function processComponentIntent() {
            // Add your existing math logic here
            alert("Processing: " + document.getElementById('subcategory_search').value);
        }
    </script>
</body>
</html>
