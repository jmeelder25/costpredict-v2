<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CostPredict | Mobile Scope Builder</title>
    <style>
        :root {
            --cp-blue: #23408A;
            --cp-yellow: #FFC113;
            --cp-bg: #f8fafc;
            --cp-text: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--cp-bg);
            color: var(--cp-text);
            margin: 0;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            max-width: 540px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header-banner {
            background: #ffffff; 
            padding: 16px;
            border-radius: 12px;
            border-bottom: 4px solid var(--cp-blue); 
            box-shadow: 0 4px 12px rgba(35, 64, 138, 0.04);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .brand-logo {
            height: 42px; 
            width: auto;
            max-width: 90%;
            object-fit: contain;
            display: block;
        }

        .tagline { 
            font-size: 10px; 
            font-weight: 700;
            color: var(--cp-blue); 
            letter-spacing: 1.75px; 
            margin-top: 8px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(35, 64, 138, 0.04);
            border: 1px solid #e2e8f0;
        }

        .results-card {
            display: none; 
            border-top: 4px solid var(--cp-blue);
        }

        h2 { color: var(--cp-blue); font-size: 16px; margin-top: 0; margin-bottom: 16px; border-bottom: 2px solid #f1f5f9; padding-bottom: 6px; font-weight: 700;}
        h2.section-break { margin-top: 12px; }

        .form-group { margin-bottom: 14px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }

        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.8rem; color: #475569; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: #ffffff;
            color: var(--cp-text);
            transition: border-color 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--cp-blue); }

        .search-input {
            border-color: #94a3b8;
            background-color: #f8fafc;
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }
        .slider-container input[type="range"] {
            flex: 1;
            padding: 0;
            accent-color: var(--cp-blue);
            cursor: pointer;
        }
        .slider-val {
            font-family: monospace;
            font-weight: 700;
            font-size: 15px;
            color: var(--cp-blue);
            width: 45px;
            text-align: right;
        }

        button.btn-primary { 
            width: 100%; 
            background: var(--cp-blue); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            text-transform: uppercase; 
            margin-top: 8px;
        }
        
        button.btn-secondary { 
            background: var(--cp-yellow); 
            color: var(--cp-blue); 
            border: none; 
            padding: 16px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            text-transform: uppercase; 
            width: 100%; 
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(255, 193, 19, 0.2);
        }

        .component-item { 
            border-left: 4px solid var(--cp-blue); 
            background: #f8fafc; 
            padding: 12px; 
            margin-bottom: 8px; 
            border-radius: 4px; 
            font-size: 0.85rem; 
        }
        .component-meta { font-size: 0.75rem; color: #64748b; margin-top: 3px; }
        
        .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #e2e8f0; font-size: 0.9rem; }
        .grand-total { font-size: 1.15rem; font-weight: bold; color: var(--cp-blue); border-top: 2px solid var(--cp-blue); padding-top: 10px; margin-top: 8px; }
        
        .footer-note { text-align: center; font-size: 10px; color: #94a3b8; margin: 15px 0 10px 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-banner">
        <img src="/static/logo.png" alt="CostPredict" class="brand-logo">
        <div class="tagline">CONSTRUCTION PRICING MADE PREDICTIVE</div>
    </div>

    <div class="card">
        <h2>Step 1. Project Description</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Project Type</label>
                <select id="project_type">
                    <option value="Residential">Residential</option>
                    <option value="Commercial">Commercial</option>
                    <option value="Mixed-Use">Mixed-Use</option>
                    <option value="Industrial">Industrial</option>
                </select>
            </div>
            <div class="form-group">
                <label>Project Location</label>
                <input type="text" id="location" placeholder="e.g. Chicago, IL" value="Chicago, IL">
            </div>
        </div>
        <div class="form-group">
            <label>Est. Start Date</label>
            <input type="date" id="start_date">
        </div>

        <h2 class="section-break">Step 2. Project Details</h2>
        
        <div class="form-group">
            <label>Search Master Items & Categories</label>
            <input type="text" id="category_search" class="search-input" placeholder="Type material name (e.g., Shaker, Quartz, Vinyl)..." onkeyup="filterMasterItems()">
        </div>

        <div class="form-group">
            <label>Main Material Category</label>
            <select id="main_category" onchange="populateSubcategories()">
                <option value="" disabled selected>Select category or type above...</option>
                <option value="Concrete">Concrete, Cement & Masonry</option>
                <option value="Cabinets">Cabinets</option>
                <option value="Vanities">Vanities</option>
                <option value="Countertops">Countertops</option>
                <option value="Toilets">Toilets & Bathroom Fixtures</option>
                <option value="Flooring">Flooring & Finishes</option>
                <option value="Drywall">Drywall Assemblies</option>
                <option value="Doors">Doors & Openings</option>
                <option value="Windows">Windows</option>
                <option value="Paint">Paint & Coatings</option>
            </select>
        </div>
        <div class="form-group">
            <label>Exact Material Subcategory</label>
            <select id="sub_category" disabled>
                <option value="">Select main category first...</option>
            </select>
        </div>
        <div class="form-group">
            <label>Quantity Needed</label>
            <input type="number" id="quantity" pattern="[0-9]*" inputmode="numeric" placeholder="Enter number quantity" min="1">
        </div>
        
        <div class="form-group">
            <label>Material Waste Allowance Factor</label>
            <div class="slider-container">
                <input type="range" id="waste_factor" min="0" max="30" value="10" oninput="updateSliderLabel(this.value)">
                <span class="slider-val" id="waste_label">10%</span>
            </div>
        </div>

        <div class="form-group">
            <label>Is Labor Required?</label>
            <select id="labor_required">
                <option value="Yes">Yes (Include Labor)</option>
                <option value="No">No (Material Only)</option>
            </select>
        </div>

        <button class="btn-primary" onclick="addComponent()">Add to Project</button>
    </div>

    <div class="card results-card" id="results_panel">
        <h2>Live Bill of Quantities</h2>
        <div id="components_list" style="margin-bottom: 20px;"></div>

        <h2>On-Screen Cost Evaluation</h2>
        <div class="summary-row"><span>Material Base Subtotal:</span><span id="lbl_mat">$0.00</span></div>
        <div class="summary-row"><span>Labor Assembly Subtotal:</span><span id="lbl_lab">$0.00</span></div>
        <div class="summary-row"><span>Regional Tax (10.25%):</span><span id="lbl_tax">$0.00</span></div>
        <div class="summary-row grand-total"><span>Project Estimation:</span><span id="lbl_total">$0.00</span></div>

        <form id="pdf_form" action="/generate" method="post">
            <input type="hidden" name="payload" id="payload_input">
            <button type="submit" class="btn-secondary">Export Verified PDF Report</button>
        </form>
    </div>
    
    <div class="footer-note">CostPredict Engine v2.5 © 2026</div>
</div>

<script>
    // Master data file array loaded directly from your spreadsheet structure
    const masterDataFile = {
        "Concrete": {
            code: "03 30 00", unit: "SF",
            items: ["Concrete Mix", "Concrete Block", "Cinder Blocks", "Rebar", "Remesh", "Brick", "Fire Brick", "Mortar Mix", "Mortar Repair", "Concrete Forms", "Concrete Sealant", "Concrete Patch"]
        },
        "Cabinets": {
            code: "06 41 16", unit: "PCS",
            items: ["Shaker Cabinets", "Raised Panel Cabinets", "Recessed Panel Cabinets", "Slab Door Cabinets", "Glass Door Cabinets", "Assembled Cabinets", "Kitchen Cabinets", "Ready to Assemble (RTA) Cabinets", "Base Cabinets", "Wall Cabinets", "Sink Base Cabinets", "Corner Cabinets", "Cabinet Hardware", "Cabinet Handles"]
        },
        "Vanities": {
            code: "06 41 20", unit: "PCS",
            items: ["Single Sink Bathroom Vanities", "Bathroom Vanities with Tops", "Double Sink Bathroom Vanities", "Bathroom Vanities without Tops", "Bathroom Vanity Sets", "Vanity Tops", "Vanity Side", "Vanity Backsplashes"]
        },
        "Countertops": {
            code: "12 36 00", unit: "SF",
            items: ["Butcher Block", "Laminate", "Laminate Sheets", "Solid Surface", "Thinscape", "Custom Countertops", "Quartz", "Granite", "Quartzite", "Marble", "Countertop Brackets"]
        },
        "Toilets": {
            code: "22 41 00", unit: "PCS",
            items: ["Two-Piece Toilets", "One-Piece Toilets", "Freestanding Bidet Toilets", "Composting Toilets", "Toilet Seats", "Bidet Toilets", "ADA Compliant Toilets", "Wax Rings", "Toilet Repair Kits", "Supply Lines", "Elongated Toilets", "Round Toilets"]
        },
        "Flooring": {
            code: "09 65 19", unit: "SF",
            items: ["Floor Tile", "Ceramic Tile", "Porcelain Tile", "Subway Tile", "Mosaic Tile", "Vinyl Flooring", "Vinyl Plank Flooring", "Vinyl Tile", "Sheet Vinyl Flooring", "Laminate Flooring", "Laminate Wood Flooring", "Solid Hardwood Flooring", "Engineered Hardwood", "Carpet Tile", "Tile Mortar", "Tile Grout"]
        },
        "Drywall": {
            code: "09 29 00", unit: "SF",
            items: ["Drywall Panels", "Drywall Sheets", "Corner Beads", "Drywall Joint Compound", "Drywall Repair", "Drywall Tape", "Drywall Framing"]
        },
        "Doors": {
            code: "08 14 16", unit: "PCS",
            items: ["Exterior Doors", "Front Doors", "Patio Doors", "Interior Doors", "Prehung Doors", "Slab Doors", "Garage Doors", "Storm Doors", "Commercial Doors", "Barn Doors", "Bifold Doors", "Sliding Doors", "Door Hardware"]
        },
        "Windows": {
            code: "08 51 13", unit: "PCS",
            items: ["Double-Hung Windows", "Single-Hung Windows", "Sliding Windows", "Picture Windows", "Casement Windows", "Vinyl Windows", "Insulated Windows", "Window Screens", "Window Locks"]
        },
        "Paint": {
            code: "09 91 00", unit: "GAL",
            items: ["Interior Paint", "Exterior Paint", "Spray Paint", "Primers", "Exterior Wood Stains", "Interior Wood Stains", "Concrete Sealers", "Garage Floor Paint", "Polyurethane Wood Finish", "Caulk & Sealants"]
        }
    };

    // Baseline mock cost engine matching structural pricing data
    const baselinePricing = { mat_base: 45.00, lab_base: 35.00 };
    let projectScope = [];

    function updateSliderLabel(val) {
        document.getElementById('waste_label').innerText = val + '%';
    }

    // Interactive global search function scans the entire structure 
    function filterMasterItems() {
        const searchText = document.getElementById('category_search').value.toLowerCase();
        const mainSelect = document.getElementById('main_category');
        
        if (searchText.trim() === "") return;

        // Iterate through all datasets to find matching subcategories
        for (const [categoryKey, categoryData] of Object.entries(masterDataFile)) {
            const foundItem = categoryData.items.find(item => item.toLowerCase().includes(searchText));
            
            if (foundItem) {
                mainSelect.value = categoryKey;
                populateSubcategories();
                document.getElementById('sub_category').value = foundItem;
                break;
            }
        }
    }

    // Handles downstream selector population from the master data keys
    function populateSubcategories() {
        const mainCat = document.getElementById('main_category').value;
        const subSelect = document.getElementById('sub_category');
        subSelect.innerHTML = '';
        subSelect.disabled = false;

        if (!masterDataFile[mainCat]) return;

        masterDataFile[mainCat].items.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item;
            opt.innerHTML = item;
            subSelect.appendChild(opt);
        });

        // Auto-assign specific safe baseline multipliers based on discipline rules
        const slider = document.getElementById('waste_factor');
        if (mainCat === "Concrete" || mainCat === "Drywall") {
            slider.value = 15;
        } else {
            const currentSub = subSelect.value || "";
            if (currentSub.includes("Tile") || currentSub.includes("Marble") || currentSub.includes("Granite")) {
                slider.value = 15;
            } else {
                slider.value = 10;
            }
        }
        updateSliderLabel(slider.value);
    }

    function addComponent() {
        const main = document.getElementById('main_category').value;
        const sub = document.getElementById('sub_category').value;
        const qty = parseFloat(document.getElementById('quantity').value);
        const laborReq = document.getElementById('labor_required').value === "Yes";
        const wastePct = parseFloat(document.getElementById('waste_factor').value);

        if (!main || !sub || isNaN(qty) || qty <= 0) {
            alert("Please input a valid quantity.");
            return;
        }

        const metadata = masterDataFile[main];
        let lineItems = [];
        
        // Exact waste logic integration
        let wasteFactor = 1 + (wastePct / 100);
        let finalQty = Math.ceil(qty * wasteFactor);

        lineItems.push({
            code: metadata.code,
            desc: sub,
            qty: finalQty,
            unit: metadata.unit,
            mat_cost: finalQty * baselinePricing.mat_base,
            lab_cost: laborReq ? (finalQty * baselinePricing.lab_base) : 0
        });

        // Dynamic accessory injection rules from the master sheet variables
        if (sub.includes("Vinyl Plank") || sub.includes("Laminate Flooring")) {
            let tstrips = Math.max(1, Math.ceil(qty / 300));
            lineItems.push({ code: "09 65 13", desc: "Matching T-Mold Transitions", qty: tstrips, unit: "PCS", mat_cost: tstrips * 45, lab_cost: laborReq ? (tstrips * 25) : 0 });
        } else if (sub.includes("Tile")) {
            let thinset = Math.max(1, Math.ceil(qty / 60));
            lineItems.push({ code: "09 30 05", desc: "Polymer Thinset Mortar (50lb)", qty: thinset, unit: "BAGS", mat_cost: thinset * 32, lab_cost: 0 });
        } else if (sub.includes("Cabinets") && (sub.includes("Base") || sub.includes("Kitchen"))) {
            let pulls = finalQty;
            lineItems.push({ code: "06 41 16", desc: "Cabinet Hardware Pulls", qty: pulls, unit: "PCS", mat_cost: pulls * 8.50, lab_cost: laborReq ? (pulls * 5.00) : 0 });
        }

        projectScope.push(...lineItems);
        renderProjectState();
        
        document.getElementById('quantity').value = '';
        document.getElementById('category_search').value = '';
        
        const resultsPanel = document.getElementById('results_panel');
        resultsPanel.style.display = 'block';
        resultsPanel.scrollIntoView({ behavior: 'smooth' });
    }

    function renderProjectState() {
        const listDiv = document.getElementById('components_list');
        listDiv.innerHTML = '';
        let totalMat = 0, totalLab = 0;

        projectScope.forEach(item => {
            totalMat += item.mat_cost;
            totalLab += item.lab_cost;

            let div = document.createElement('div');
            div.className = 'component-item';
            div.innerHTML = `
                <div style="font-weight:700;">${item.desc} <span style="float:right; font-family:monospace; color:#64748b; font-size:11px;">${item.code}</span></div>
                <div class="component-meta">Qty: ${item.qty} ${item.unit} | Mat: $${item.mat_cost.toFixed(2)} | Lab: $${item.lab_cost.toFixed(2)}</div>
            `;
            listDiv.appendChild(div);
        });

        let taxRate = document.getElementById('location').value.includes("Chicago") ? 0.1025 : 0.08;
        let computedTax = totalMat * taxRate;
        let grandTotal = totalMat + totalLab + computedTax;

        document.getElementById('lbl_mat').innerHTML = `$${totalMat.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        document.getElementById('lbl_lab').innerHTML = `$${totalLab.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        document.getElementById('lbl_tax').innerHTML = `$${computedTax.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        document.getElementById('lbl_total').innerHTML = `$${grandTotal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

        const fullPayload = {
            metadata: {
                project_type: document.getElementById('project_type').value,
                location: document.getElementById('location').value,
                start_date: document.getElementById('start_date').value
            },
            line_items: projectScope,
            totals: { mat: totalMat, lab: totalLab, tax: computedTax, grand: grandTotal }
        };

        document.getElementById('payload_input').value = JSON.stringify(fullPayload);
    }
</script>
</body>
</html>
