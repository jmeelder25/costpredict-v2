<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CostPredict Project Calculator</title>
    <style>
        :root {
            --primary: #23408A;
            --slate: #1e293b;
            --border: #e2e8f0;
        }
        body { font-family: system-ui, -apple-system, sans-serif; padding: 40px; color: var(--slate); max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 30px; }
        .control-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        select, input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 11pt; }
        .card { border: 1px solid var(--border); padding: 24px; border-radius: 8px; background: #f8fafc; }
        .price-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--border); }
        .price-row.total { border-top: 2px solid var(--primary); font-weight: bold; color: var(--primary); border-bottom: none; margin-top: 15px; font-size: 13pt;}
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; font-size: 11pt; }
        button:hover { opacity: 0.9; }
    </style>

    <script>
        const master_data = {{ master_data | safe }};
    </script>
</head>
<body>

    <h1>CostPredict Estimator Dashboard</h1>

    <div class="grid">
        <div>
            <div class="control-group">
                <label for="category-select">Material Category</label>
                <select id="category-select" onchange="populateItems()">
                    <option value="">-- Select Category --</option>
                </select>
            </div>

            <div class="control-group">
                <label for="item-select">Specific Component Item</label>
                <select id="item-select" onchange="calculateCosts()">
                    <option value="">-- Select Item --</option>
                </select>
            </div>

            <div class="control-group">
                <label for="quantity-input">Project Target Quantity</label>
                <input type="number" id="quantity-input" value="1000" min="1" oninput="calculateCosts()">
            </div>
            
            <form action="/generate" method="POST" onsubmit="preparePayload(event)">
                <input type="hidden" name="payload" id="payload-field">
                <button type="submit">📥 Export Project PDF Report</button>
            </form>
        </div>

        <div class="card">
            <h3>Estimation Matrix Breakdown</h3>
            <div class="price-row"><span>CSI Reference Code:</span> <span id="out-csi">-</span></div>
            <div class="price-row"><span>Unit of Measure:</span> <span id="out-unit">-</span></div>
            
            <h4>Unit Baseline Costs</h4>
            <div class="price-row"><span>Material Unit Cost (Avg):</span> <span id="unit-mat">$0.00</span></div>
            <div class="price-row"><span>Labor Unit Cost (Avg):</span> <span id="unit-lab">$0.00</span></div>
            
            <h4>Calculated Scope Totals</h4>
            <div class="price-row"><span>Total Material Cost:</span> <span id="total-mat">$0.00</span></div>
            <div class="price-row"><span>Total Labor Cost:</span> <span id="total-lab">$0.00</span></div>
            <div class="price-row total"><span>Estimated Project Subtotal:</span> <span id="total-combined">$0.00</span></div>
        </div>
    </div>

    <script>
        // Populate the primary Category Dropdown from master JSON keys on window mount
        window.addEventListener('DOMContentLoaded', () => {
            const catSelect = document.getElementById('category-select');
            Object.keys(master_data).forEach(category => {
                let opt = document.createElement('option');
                opt.value = category;
                opt.textContent = category;
                catSelect.appendChild(opt);
            });
        });

        function populateItems() {
            const catSelect = document.getElementById('category-select').value;
            const itemSelect = document.getElementById('item-select');
            
            itemSelect.innerHTML = '<option value="">-- Select Item --</option>';
            
            if (!catSelect || !master_data[catSelect]) return;

            const items = master_data[catSelect].items;
            Object.keys(items).forEach(itemName => {
                let opt = document.createElement('option');
                opt.value = itemName;
                opt.textContent = itemName;
                itemSelect.appendChild(opt);
            });
            calculateCosts();
        }

        function calculateCosts() {
            const cat = document.getElementById('category-select').value;
            const item = document.getElementById('item-select').value;
            const qty = parseFloat(document.getElementById('quantity-input').value) || 0;

            if (!cat || !item || !master_data[cat] || !master_data[cat].items[item]) {
                resetDisplay();
                return;
            }

            const target = master_data[cat];
            const pricing = target.items[item];

            // Enforce explicit types using global Number object parsing wrappers
            const avgMat = Number(pricing.avg_mat || 45.00);
            const avgLab = Number(pricing.avg_lab || 35.00);

            const matTotal = avgMat * qty;
            const labTotal = avgLab * qty;
            const combined = matTotal + labTotal;

            // Output safely back into presentation DOM fields
            document.getElementById('out-csi').textContent = target.code || "09 00 00";
            document.getElementById('out-unit').textContent = target.unit || "PCS";
            
            document.getElementById('unit-mat').textContent = `$${avgMat.toFixed(2)}`;
            document.getElementById('unit-lab').textContent = `$${avgLab.toFixed(2)}`;
            
            document.getElementById('total-mat').textContent = `$${matTotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('total-lab').textContent = `$${labTotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('total-combined').textContent = `$${combined.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        function resetDisplay() {
            ['out-csi', 'out-unit'].forEach(id => document.getElementById(id).textContent = '-');
            ['unit-mat', 'unit-lab', 'total-mat', 'total-lab', 'total-combined'].forEach(id => document.getElementById(id).textContent = '$0.00');
        }

        function preparePayload(event) {
            const cat = document.getElementById('category-select').value;
            const item = document.getElementById('item-select').value;
            const qty = parseFloat(document.getElementById('quantity-input').value) || 0;

            if (!cat || !item) {
                event.preventDefault();
                alert('Please complete item and selection values before exporting reports.');
                return;
            }

            const pricing = master_data[cat].items[item];
            
            // Build structured payload schema array to pass cleanly to main.py endpoint
            const payloadData = {
                line_items: [{
                    desc: `${cat} - ${item}`,
                    qty: qty,
                    unit: master_data[cat].unit || "PCS",
                    mat_avg: Number(pricing.avg_mat || 45.00),
                    lab_avg: Number(pricing.avg_lab || 35.00)
                }]
            };

            document.getElementById('payload-field').value = JSON.stringify(payloadData);
        }
    </script>
</body>
</html>
