<head>
    <style>
        /* ADD THIS BLOCK TO YOUR EXISTING STYLE TAGS */
        @media print {
            /* Hide non-report elements during printing */
            header, nav, #form-container, #risk-slider, button, .footer-buttons, .no-print { 
                display: none !important; 
            }
            /* Clean up the display for the printout */
            #checkout-section { 
                border: none !important; 
                box-shadow: none !important; 
                padding: 0 !important;
                width: 100% !important;
            }
            body { background: white !important; color: black !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
        }
    </style>
</head>
