<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Estimator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .card-transition { transition: all 0.2s ease-in-out; }
        .card-transition:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen font-sans">

    <header class="bg-slate-800 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                <h1 class="text-2xl font-bold tracking-wide">Project Estimator</h1>
            </div>
            
            <div class="w-full md:w-1/3 relative">
                <input type="text" id="searchInput" placeholder="Search Construction Subcategories..." 
                    class="w-full pl-10 pr-4 py-2 rounded-lg text-gray-900 border-none focus:ring-2 focus:ring-blue-500 outline-none"
                    onkeyup="filterCatalog()">
                <svg class="w-5 h-5 text-gray-500 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-xs text-slate-300 uppercase tracking-wider">Est. Complexity</p>
                    <p class="text-lg font-bold text-green-400" id="confidenceScore">0</p>
                </div>
                <button onclick="submitCalculation()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-semibold shadow-lg transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Generate PDF Report
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-lg font-bold text-slate-800">Material & Labor Selection</h2>
                <p class="text-sm text-gray-500">Adjust sliders to define quantities and review automated waste tracking.</p>
            </div>
            <div class="text-right">
                <p class="text-sm text-gray-500">Total Items Selected</p>
                <p class="text-2xl font-bold text-blue-600" id="totalItems">0</p>
            </div>
        </div>

        <div id="catalog-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="col-span-full text-center py-12 text-gray-400" id="loadingState">
                Loading categories...
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-6 text-center text-sm border-t border-slate-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center">
            <p>&copy; 2026 Construction Management System. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function loadCatalog() {
            try {
                const response = await fetch('/api/catalog');
                const data = await response.json();
                renderCatalog(data);
            } catch (error) {
                document.getElementById('loadingState').innerText = "Error connecting to backend.";
            }
        }

        function renderCatalog(data) {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = ''; 
            for (const [category, items] of Object.entries(data)) {
                const formattedTitle = category.replace(/-/g, ' ').replace(/^\d+-/, '');
                let section = `<div class="category-card bg-white p-5 rounded-xl shadow-sm border border-gray-200 card-transition" data-category="${category.toLowerCase()}">
                        <div class="flex justify-between items-center border-b border-gray-100 pb-3 mb-4">
                            <h3 class="text-xl font-bold text-slate-800">${formattedTitle}</h3>
                        </div>
                        <div class="space-y-5">`;
                items.forEach((item, index) => {
                    const itemId = `${category}-item-${index}`;
                    section += `
                        <div class="subcategory-item bg-slate-50 p-4 rounded-lg border border-slate-100">
                            <h4 class="font-semibold text-slate-700">${item.name}</h4>
                            <div class="flex items-center gap-4 mt-3">
                                <input type="range" min="0" max="500" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" 
                                    id="slider-${itemId}" oninput="document.getElementById('output-${itemId}').value = this.value; updateTotals();">
                                <input type="number" min="0" value="0" class="w-16 text-center border rounded px-2 py-1 text-sm font-semibold" 
                                    id="output-${itemId}" data-name="${item.name}" oninput="document.getElementById('slider-${itemId}').value = this.value; updateTotals();">
                            </div>
                        </div>`;
                });
                section += `</div></div>`;
                grid.innerHTML += section;
            }
            document.getElementById('loadingState').style.display = 'none';
        }

        function updateTotals() {
            const inputs = document.querySelectorAll('input[type="number"]');
            let activeItems = 0;
            inputs.forEach(i => { if (parseInt(i.value) > 0) activeItems++; });
            document.getElementById('totalItems').innerText = activeItems;
        }

        async function submitCalculation() {
            const inputs = document.querySelectorAll('input[type="number"]');
            const payload = Array.from(inputs).map(i => ({
                name: i.dataset.name,
                quantity: parseFloat(i.value) || 0
            })).filter(i => i.quantity > 0);

            if(payload.length === 0) {
                alert("Please add quantities.");
                return;
            }

            const response = await fetch('/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            
            document.getElementById('confidenceScore').innerText = result.total_labor_complexity;
            alert(`Calculation Success!\nTotal Labor Complexity: ${result.total_labor_complexity}\nCheck console for details.`);
            console.log("Calculation Breakdown:", result.line_items);
        }

        document.addEventListener('DOMContentLoaded', loadCatalog);
    </script>
</body>
</html>
