<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CostPredict - Estimate Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-8">

    <header class="max-w-5xl mx-auto mb-8 flex items-center gap-4">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="CostPredict Logo" class="h-16 w-auto" onerror="this.src='https://via.placeholder.com/150x50?text=CostPredict+Logo'">
        <h1 class="text-3xl font-bold text-blue-900">CostPredict Estimator</h1>
    </header>

    <div class="max-w-5xl mx-auto bg-white p-8 rounded-lg shadow-lg">
        
        <form id="estimate-form">
            <section class="mb-8">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">Project Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Project Type</label>
                        <select id="project-type" class="w-full p-2 border rounded bg-white">
                            <option value="Commercial">Commercial</option>
                            <option value="Residential">Residential</option>
                            <option value="Industrial">Industrial</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Zip Code</label>
                        <input type="text" id="zip-code" class="w-full p-2 border rounded" placeholder="e.g. 60601" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
                        <input type="date" id="start-date" class="w-full p-2 border rounded" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Delay Escalation (Months)</label>
                        <input type="number" id="delay-months" class="w-full p-2 border rounded" value="0" min="0">
                    </div>
                </div>
            </section>

            <section class="mb-8">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">Material & Labor Specifications</h2>
                
                <datalist id="main-categories-list"></datalist>

                <div id="materials-container"></div>
                
                <button type="button" onclick="addMaterialRow()" class="mt-4 bg-blue-50 text-blue-700 px-4 py-2 border border-blue-200 rounded hover:bg-blue-100 transition shadow-sm font-medium">
                    + Add Material Item
                </button>
            </section>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded hover:bg-blue-700 transition shadow-md text-lg">
                Generate Cost Estimate PDF
            </button>
        </form>
    </div>

    <script>
        let goldenCatalog = {};

        // Fetch catalog on load and setup initial data
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/catalog');
                goldenCatalog = await response.json();
                
                // Populate the global datalist for Main Categories
                const datalist = document.getElementById('main-categories-list');
                for (const mainCat in goldenCatalog) {
                    const option = document.createElement('option');
                    option.value = mainCat;
                    datalist.appendChild(option);
                }

                // Add the first empty row
                addMaterialRow();
            } catch (error) {
                console.error("Error loading Golden Catalog:", error);
                alert("Failed to load catalog engine. Is the backend running?");
            }
        });

        function addMaterialRow() {
            const container = document.getElementById('materials-container');
            const rowId = 'row-' + Date.now(); // Unique ID for each row
            
            // 4. "Material Block #1" is removed.
            // 5. Labels renamed.
            // 2. 92% Confidence text removed.
            const rowHtml = `
                <div id="${rowId}" class="material-row grid grid-cols-1 md:grid-cols-12 gap-4 items-end mb-4 p-5 border rounded-lg bg-gray-50 relative">
                    
                    <button type="button" onclick="document.getElementById('${rowId}').remove()" class="absolute top-2 right-3 text-red-400 hover:text-red-600 font-bold" title="Remove Item">✕</button>

                    <div class="col-span-12 md:col-span-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Main Material Category</label>
                        <input type="text" list="main-categories-list" class="main-cat-input w-full p-2 border rounded" placeholder="Start typing category..." required>
                    </div>
                    <div class="col-span-12 md:col-span-3">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Material Subcategory</label>
                        <select class="sub-cat-input w-full p-2 border rounded bg-white" required disabled>
                            <option value="">Select Main First...</option>
                        </select>
                    </div>
                    <div class="col-span-12 md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                        <input type="number" class="qty-input w-full p-2 border rounded" min="0" step="0.1" placeholder="0.0" required>
                    </div>
                    <div class="col-span-12 md:col-span-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Waste (%)</label>
                        <input type="number" class="waste-input w-full p-2 border rounded" min="0" value="0">
                    </div>
                    <div class="col-span-12 md:col-span-2 flex items-center mb-2">
                        <input type="checkbox" class="labor-input mr-2 h-5 w-5 text-blue-600 rounded">
                        <label class="text-sm font-medium text-gray-700">Include Labor</label>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', rowHtml);
            
            // 6. Connect dynamic behavior to the newly created row
            const newRow = document.getElementById(rowId);
            const mainInput = newRow.querySelector('.main-cat-input');
            const subSelect = newRow.querySelector('.sub-cat-input');
            const wasteInput = newRow.querySelector('.waste-input');
            
            mainInput.addEventListener('input', function() {
                const selectedMain = this.value;
                
                if (goldenCatalog[selectedMain]) {
                    // Category exists: populate the subcategory dropdown
                    subSelect.innerHTML = '<option value="">Select Subcategory...</option>';
                    goldenCatalog[selectedMain].forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.name;
                        // Show the unit in the dropdown for clarity
                        option.textContent = `${item.name} (${item.unit})`;
                        option.dataset.waste = item.default_waste;
                        subSelect.appendChild(option);
                    });
                    subSelect.disabled = false;
                } else {
                    // Invalid/typing: lock subcategory
                    subSelect.innerHTML = '<option value="">Select Main First...</option>';
                    subSelect.disabled = true;
                    wasteInput.value = 0;
                }
            });

            // Automatically set default waste when a subcategory is chosen
            subSelect.addEventListener('change', function() {
                const selectedOption = this.options[this.selectedIndex];
                if (selectedOption && selectedOption.dataset.waste !== undefined) {
                    wasteInput.value = selectedOption.dataset.waste;
                }
            });
        }

        // Handle form submission and send to the Python Backend
        document.getElementById('estimate-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = "Generating PDF...";

            // Gather Form Data
            const payload = {
                project_info: {
                    projectType: document.getElementById('project-type').value,
                    zipCode: document.getElementById('zip-code').value,
                    startDate: document.getElementById('start-date').value
                },
                delay_months: parseInt(document.getElementById('delay-months').value) || 0,
                materials: []
            };

            const rows = document.querySelectorAll('.material-row');
            rows.forEach(row => {
                payload.materials.push({
                    category: row.querySelector('.main-cat-input').value,
                    subcategory: row.querySelector('.sub-cat-input').value,
                    quantity: parseFloat(row.querySelector('.qty-input').value) || 0,
                    waste: parseFloat(row.querySelector('.waste-input').value) || 0,
                    labor: row.querySelector('.labor-input').checked
                });
            });

            try {
                // Send JSON payload to the backend
                const response = await fetch('/api/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    // Handle PDF download
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    window.open(url, '_blank'); // Opens PDF in a new tab
                } else {
                    alert('Error generating report. Check backend logs.');
                }
            } catch (error) {
                console.error('Submission Error:', error);
                alert('Failed to connect to the backend server.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Generate Cost Estimate PDF";
            }
        });
    </script>
</body>
</html>
