<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CostPredict | Pricing Made Predictive</title>
    <style>
        :root { --cp-blue: #23408A; --cp-yellow: #FFC113; --cp-bg: #f8fafc; --cp-text: #0f172a; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--cp-bg); color: var(--cp-text); margin: 0; padding: 12px; }
        .wrapper { max-width: 540px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
        .header-banner { background: #ffffff; padding: 16px; border-radius: 12px; border-bottom: 4px solid var(--cp-blue); text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .results-card { display: none; border-top: 4px solid var(--cp-blue); }
        h2 { color: var(--cp-blue); font-size: 16px; margin: 0 0 16px 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 6px; }
        .form-group { margin-bottom: 14px; position: relative; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .autocomplete-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #cbd5e1; border-radius: 8px; max-height: 200px; overflow-y: auto; z-index: 999; display: none; }
        .suggestion-item { padding: 12px; cursor: pointer; }
        .suggestion-item:hover { background-color: #f1f5f9; }
        .btn-primary { width: 100%; background: var(--cp-blue); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: var(--cp-yellow); color: var(--cp-blue); border: none; padding: 16px; border-radius: 8px; width: 100%; margin-top: 15px; cursor: pointer; font-weight: 700; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.9rem; }
        .grand-total { font-weight: bold; color: var(--cp-blue); border-top: 2px solid var(--cp-blue); padding-top: 10px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header-banner"><h3>CostPredict Estimator</h3></div>
    
    <div class="card">
        <h2>Project Info</h2>
        <div class="form-group"><label>Zip Code</label><input type="number" id="location" placeholder="12345"></div>
    </div>

    <div class="card">
        <h2>Add Material</h2>
        <div class="form-group"><label>Category</label><input type="text" id="category_search" oninput="showCategories(this.value)"><div id="category_suggestions" class="autocomplete-suggestions"></div></div>
        <div class="form-group"><label>Subcategory</label><input type="text" id="subcategory_search" disabled oninput="showSubcategories(this.value)"><div id="subcategory_suggestions" class="autocomplete-suggestions"></div></div>
        <button class="btn-primary" onclick="processComponentIntent()">Add to Project</button>
    </div>

    <div class="card results-card" id="results_panel">
        <h2 id="status_msg">Cost Prediction</h2>
        <div class="summary-row"><span>Material:</span><span id="lbl_mat">$0.00</span></div>
        <div class="summary-row"><span>Labor:</span><span id="lbl_lab">$0.00</span></div>
        <div class="summary-row grand-total"><span>Total:</span><span id="lbl_total">$0.00</span></div>
        
        <form action="/generate" method="post">
            <input type="hidden" name="payload" id="payload_input">
            <button type="submit" class="btn-secondary">Print Project Report</button>
        </form>
    </div>

    <footer style="margin-top: 40px; padding: 20px; text-align: center; color: #64748b; font-size: 0.75rem; border-top: 1px solid #e2e8f0;">
        <p>&copy; 2026 CostPredict. All rights reserved.</p>
        <p>Legal Disclaimer: Estimates for informational purposes only. Verify with professionals.</p>
    </footer>
</div>

<script>
    let projectScope = [];
    let masterCategories = {};

    window.onload = async () => {
        const res = await fetch('/categories.json');
        masterCategories = await res.json();
    };

    async function processComponentIntent() {
        const cat = document.getElementById('category_search').value;
        const sub = document.getElementById('subcategory_search').value;
        const zip = document.getElementById('location').value;
        const msg = document.getElementById('status_msg');

        if (!zip || !cat) return alert("Please fill Zip and Category.");

        msg.innerText = "Checking local rates...";
        const response = await fetch(`/api/pricing?category=${cat}&zip=${zip}`);
        
        if (response.status === 404) {
            msg.innerText = "Generating estimates... please wait a minute.";
            return;
        }

        const data = await response.json();
        // Add current item to list
        projectScope.push({ ...data, subcategory: sub, qty: 1, includeLabor: true });
        
        // Update UI and hidden payload for PDF
        renderProjectState();
        document.getElementById('payload_input').value = JSON.stringify({ line_items: projectScope });
    }

    function renderProjectState() {
        let mat = projectScope.reduce((sum, p) => sum + Number(p.avg_mat || 0), 0);
        let lab = projectScope.reduce((sum, p) => sum + Number(p.avg_lab || 0), 0);
        document.getElementById('lbl_mat').innerText = `$${mat.toFixed(2)}`;
        document.getElementById('lbl_lab').innerText = `$${lab.toFixed(2)}`;
        document.getElementById('lbl_total').innerText = `$${(mat + lab).toFixed(2)}`;
        document.getElementById('results_panel').style.display = 'block';
    }

    // Helper Autocomplete functions (Add your previous logic here)
    function showCategories(q) { /* ... */ }
    function showSubcategories(q) { /* ... */ }
</script>
</body>
</html>
