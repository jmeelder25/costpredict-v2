<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CostPredict | Mobile Scope Builder</title>
    <style>
        :root {
            --cp-blue: #23408A;
            --cp-yellow: #FFC113;
            --cp-bg: #f8fafc;
            --cp-text: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--cp-bg);
            color: var(--cp-text);
            margin: 0;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper {
            max-width: 540px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header-banner {
            background: var(--cp-blue);
            color: white;
            padding: 20px 16px;
            border-radius: 12px;
            border-bottom: 5px solid var(--cp-yellow);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .brand-logo {
            height: 38px;
            width: auto;
            max-width: 90%;
            object-fit: contain;
            display: block;
        }

        .tagline { 
            font-size: 10.5px; 
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1.75px; 
            margin-top: 8px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(35, 64, 138, 0.04);
            border: 1px solid #e2e8f0;
        }

        .results-card {
            display: none; 
            border-top: 4px solid var(--cp-blue);
        }

        h2 { color: var(--cp-blue); font-size: 16px; margin-top: 0; margin-bottom: 16px; border-bottom: 2px solid #f1f5f9; padding-bottom: 6px; font-weight: 700;}
        h2.section-break { margin-top: 12px; }

        .form-group { margin-bottom: 14px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }

        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.8rem; color: #475569; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: #ffffff;
            color: var(--cp-text);
            transition: border-color 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--cp-blue); }

        /* Highlighted style for the active search bar */
        .search-input {
            border-color: #94a3b8;
            background-color: #f8fafc;
            margin-bottom: 8px;
        }

        button.btn-primary { 
            width: 100%; 
            background: var(--cp-blue); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            text-transform: uppercase; 
            margin-top: 8px;
        }
        
        button.btn-secondary { 
            background: var(--cp-yellow); 
            color: var(--cp-blue); 
            border: none; 
            padding: 16px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 15px;
            cursor: pointer; 
            text-transform: uppercase; 
            width: 100%; 
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(255, 193, 19, 0.2);
        }

        .component-item { 
            border-left: 4px solid var(--cp-blue); 
            background: #f8fafc; 
            padding: 12px; 
            margin-bottom: 8px; 
            border-radius: 4px; 
            font-size: 0.85rem; 
        }
        .component-meta { font-size: 0.75rem; color: #64748b; margin-top: 3px; }
        
        .summary-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #e2e8f0; font-size: 0.9rem; }
        .grand-total { font-size: 1.15rem; font-weight: bold; color: var(--cp-blue); border-top: 2px solid var(--cp-blue); padding-top: 10px; margin-top: 8px; }
        
        .footer-note { text-align: center; font-size: 10px; color: #94a3b8; margin: 15px 0 10px 0; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header-banner">
        <img src="/static/CostPredict_Logo_White.png" alt="CostPredict" class="brand-logo">
        <div class="tagline">PRICING MADE PREDICTIVE</div>
    </div>

    <div class="card">
        <h2>1. Project Description</h2>
        <div class="form-row">
            <div class="form-group">
                <label>Project Type</label>
                <select id="project_type">
                    <option value="Residential">Residential</option>
                    <option value="Commercial">Commercial</option>
                    <option value="Mixed-Use">Mixed-Use</option>
                    <option value="Industrial">Industrial</option>
                </select>
            </div>
            <div class="form-group">
                <label>Project Location</label>
                <input type="text" id="location" placeholder="e.g. Chicago, IL" value="Chicago, IL">
            </div>
        </div>
        <div class="form-group">
            <label>Est. Start Date</label>
            <input type="date" id="start_date">
        </div>

        <h2 class="section-break">2. Project Details</h2>
        
        <div class="form-group">
            <label>Search Category / Tab</label>
            <input type="text" id="category_search" class="search-input" placeholder="Type to filter e.g. Wood, Concrete..." onkeyup="filterCategories()">
        </div>

        <div class="form-group">
            <label>Main Material Category (Spreadsheet Tab)</label>
            <select id="main_category" onchange="updateSubcategories()">
                <option value="" disabled selected>Select category...</option>
                <option value="GeneralConditions">Tab 1: General Conditions</option>
                <option value="Concrete">Tab 2: Concrete & Foundations</option>
                <option value="Masonry">Tab 3: Masonry Divisions</option>
                <option value="Metals">Tab 4: Structural Metals</option>
                <option value="WoodPlasticComposites">Tab 5: Wood, Plastics & Composites</option>
                <option value="ThermalMoistureProtection">Tab 6: Thermal & Moisture Protection</option>
                <option value="Openings">Tab 7: Openings (Doors & Windows)</option>
                <option value="Finishes">Tab 8: Finishes & Drywall Systems</option>
                <option value="Specialties">Tab 9: Specialties & Equipment</option>
                <option value="ConveyingEquipment">Tab 10: Conveying Systems</option>
            </select>
        </div>
        <div class="form-group">
            <label>Exact Material Subcategory (Table Item)</label>
            <select id="sub_category" disabled>
                <option value="">Select main tab first...</option>
            </select>
        </div>
        <div class="form-group">
            <label>Quantity Needed (e.g. 1,200 sqft)</label>
            <input type="number" id="quantity" pattern="[0-9]*" inputmode="numeric" placeholder="Enter number quantity" min="1">
        </div>
        <div class="form-group">
            <label>Is Labor Required?</label>
            <select id="labor_required">
                <option value="Yes">Yes (Include Labor)</option>
                <option value="No">No (Material Only)</option>
            </select>
        </div>

        <button class="btn-primary" onclick="addComponent()">Add to Project</button>
    </div>

    <div class="card results-card" id="results_panel">
        <h2>Live Bill of Quantities</h2>
        <div id="components_list" style="margin-bottom: 20px;"></div>

        <h2>On-Screen Cost Evaluation</h2>
        <div class="summary-row"><span>Material Base Subtotal:</span><span id="lbl_mat">$0.00</span></div>
        <div class="summary-row"><span>Labor Assembly Subtotal:</span><span id="lbl_lab">$0.00</span></div>
        <div class="summary-row"><span>Regional Tax (10.25%):</span><span id="lbl_tax">$0.00</span></div>
        <div class="summary-row grand-total"><span>Project Estimation:</span><span id="lbl_total">$0.00</span></div>

        <form id="pdf_form" action="/generate" method="post">
            <input type="hidden" name="payload" id="payload_input">
            <button type="submit" class="btn-secondary">Export Verified PDF Report</button>
        </form>
    </div>
    
    <div class="footer-note">CostPredict Engine v2.5 © 2026</div>
</div>
