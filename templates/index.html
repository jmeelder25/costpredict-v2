<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CostPredict | Estimator</title>
    <style>
        :root { --cp-blue: #23408A; --cp-yellow: #FFC113; --cp-bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--cp-bg); margin: 0; padding: 20px; }
        .wrapper { max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        label { display: block; font-weight: 600; font-size: 0.8rem; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .checkbox-container { display: flex; align-items: center; padding: 10px; background: #f1f5f9; border-radius: 6px; cursor: pointer; }
        .btn-primary { width: 100%; background: var(--cp-blue); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .autocomplete-suggestions { position: absolute; background: white; border: 1px solid #ccc; width: calc(100% - 40px); max-height: 150px; overflow-y: auto; z-index: 10; display: none; }
        .suggestion-item { padding: 10px; cursor: pointer; }
        .suggestion-item:hover { background: #e2e8f0; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="card">
        <h2>Project Information</h2>
        <label>Type</label>
        <select id="project_type"><option>Residential</option><option>Commercial</option></select>
        <label>Zip Code</label>
        <input type="number" id="location" placeholder="12345">
        <label>Date</label>
        <input type="date" id="project_date">
    </div>

    <div class="card">
        <h2>Add Material</h2>
        <label>Category</label>
        <input type="text" id="category_search" placeholder="Search..." oninput="showCategories(this.value)" onfocus="showCategories('')">
        <div id="category_suggestions" class="autocomplete-suggestions"></div>
        
        <label>Subcategory</label>
        <input type="text" id="subcategory_search" placeholder="Select category first..." disabled oninput="showSubcategories(this.value)" onfocus="showSubcategories('')">
        <div id="subcategory_suggestions" class="autocomplete-suggestions"></div>
        
        <label>Quantity</label>
        <input type="number" id="quantity" value="1">
        
        <label class="checkbox-container">
            <input type="checkbox" id="include_labor" checked> &nbsp; Include Labor
        </label>
        <br>
        <button class="btn-primary" onclick="processComponentIntent()">Add to Project</button>
    </div>
</div>

<script>
    let masterCategories = {};
    let projectScope = [];

    // Load dynamic catalog
    fetch('/static/categories.json')
        .then(res => res.json())
        .then(data => masterCategories = data);

    function showCategories(val) {
        const list = document.getElementById('category_suggestions');
        const filtered = Object.keys(masterCategories).filter(c => c.toLowerCase().includes(val.toLowerCase()));
        list.innerHTML = filtered.map(c => `<div class="suggestion-item" onclick="selectCat('${c}')">${c}</div>`).join('');
        list.style.display = filtered.length ? 'block' : 'none';
    }

    function selectCat(c) {
        document.getElementById('category_search').value = c;
        document.getElementById('category_suggestions').style.display = 'none';
        document.getElementById('subcategory_search').disabled = false;
    }

    function showSubcategories(val) {
        const cat = document.getElementById('category_search').value;
        const list = document.getElementById('subcategory_suggestions');
        const filtered = (masterCategories[cat] || []).filter(s => s.toLowerCase().includes(val.toLowerCase()));
        list.innerHTML = filtered.map(s => `<div class="suggestion-item" onclick="selectSub('${s}')">${s}</div>`).join('');
        list.style.display = filtered.length ? 'block' : 'none';
    }

    function selectSub(s) {
        document.getElementById('subcategory_search').value = s;
        document.getElementById('subcategory_suggestions').style.display = 'none';
    }

    async function processComponentIntent() {
        const cat = document.getElementById('category_search').value;
        const sub = document.getElementById('subcategory_search').value;
        const zip = document.getElementById('location').value;
        
        const response = await fetch(`/api/pricing?category=${cat}&subcategory=${sub}&zip=${zip}`);
        const data = await response.json();
        
        if(response.status === 404) {
            alert("Generating pricing data. Please try again in a moment.");
        } else {
            projectScope.push({...data, subcategory: sub});
            alert("Added " + sub + " to estimate.");
        }
    }
</script>
</body>
</html>
