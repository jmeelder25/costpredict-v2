<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CostPredict | Pricing Made Predictive</title>
    <style>
        :root {
            --brand-navy: #1B3688;
            --brand-yellow: #FFC20E;
            --bg-gray: #f4f7f9;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(27, 54, 136, 0.1); 
            width: 100%; 
            max-width: 450px; 
            text-align: center;
        }

        .logo-container {
            margin-bottom: 25px;
        }

        .logo-container img {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto 10px auto;
        }

        .tagline {
            font-size: 12px;
            font-weight: 700;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--brand-navy);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            border-color: var(--brand-yellow);
            outline: none;
            box-shadow: 0 0 8px rgba(255, 194, 14, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--brand-navy);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #152a6b;
            transform: translateY(-2px);
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            background-color: #f8fbff;
            border-left: 5px solid var(--brand-yellow);
            border-radius: 8px;
            text-align: left;
            display: none;
            color: #334e68;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); }
            40% { color: var(--brand-navy); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .5em 0 0 var(--brand-navy), 1em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .5em 0 0 var(--brand-navy), 1em 0 0 var(--brand-navy); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="/static/logo.png" alt="CostPredict Logo">
            <div class="tagline">Pricing Made Predictive</div>
        </div>

        <div class="form-group">
            <label for="location">Project Location</label>
            <input type="text" id="location" placeholder="City, State or Zip Code">
        </div>

        <div class="form-group">
            <label for="date">Projection Date</label>
            <input type="text" id="date" placeholder="e.g., December 2026">
        </div>

        <div class="form-group">
            <label for="category">Material Category</label>
            <select id="category">
                <option value="Lumber & Structural">Lumber & Structural</option>
                <option value="Exterior Construction">Exterior Construction</option>
                <option value="Interior Construction">Interior Construction</option>
                <option value="Plumbing & Bath">Plumbing & Bath</option>
                <option value="Cabinetry & Countertops">Cabinetry & Countertops</option>
            </select>
        </div>

        <button id="predictBtn" onclick="getEstimate()">Get Predictive
