<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CostPredict Dashboard</title>
</head>
<body>

    <div class="container">
        <div class="form-group">
            <label>Category</label>
            <input type="text" id="category_search" placeholder="Search..." onkeyup="filterCategories()" onclick="showCategories()">
            <div id="category_suggestions" class="suggestions" style="display:none; border:1px solid #ccc;"></div>
        </div>

        <div class="form-group">
            <label>Subcategory</label>
            <input type="text" id="subcategory_search" placeholder="Select a category first..." onkeyup="filterSubcategories()" onclick="showSubcategories()" disabled>
            <div id="subcategory_suggestions" class="suggestions" style="display:none; border:1px solid #ccc;"></div>
        </div>

        <input type="number" id="quantity" placeholder="Quantity">
        <button onclick="processComponentIntent()">Add to Project</button>
    </div>

    <script>
        // 1. Data Injection from Flask
        const rawData = {{ master_data | tojson | safe }} || [];
        let normalizedCatalog = [];
        let activeCategoryKey = "";

        // 2. Data Normalization (Engineered for the clean 8-column CSV structure)
        function initializeDataNormalization() {
            // Mapping the clean CSV headers to internal object properties
            normalizedCatalog = rawData.map(item => ({
                category: item.Category || "General",
                subcategory: item.Subcategory || "Unknown",
                min_mat: parseFloat(item.min_mat) || 0,
                avg_mat: parseFloat(item.avg_mat) || 0,
                max_mat: parseFloat(item.max_mat) || 0,
                min_lab: parseFloat(item.min_lab) || 0,
                avg_lab: parseFloat(item.avg_lab) || 0,
                max_lab: parseFloat(item.max_lab) || 0
            }));
            console.log("CostPredict: Engine initialized with", normalizedCatalog.length, "items.");
        }

        window.addEventListener('DOMContentLoaded', initializeDataNormalization);

        // 3. Dropdown Logic
        function showCategories() {
            const container = document.getElementById('category_suggestions');
            container.innerHTML = '';
            const cats = [...new Set(normalizedCatalog.map(i => i.category))].sort();
            cats.forEach(c => {
                let div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerText = c;
                div.style.padding = "5px";
                div.onclick = () => {
                    activeCategoryKey = c;
                    document.getElementById('category_search').value = c;
                    document.getElementById('subcategory_search').disabled = false;
                    container.style.display = 'none';
                };
                container.appendChild(div);
            });
            container.style.display = 'block';
        }

        function filterSubcategories() {
            const query = document.getElementById('subcategory_search').value.toLowerCase();
            const container = document.getElementById('subcategory_suggestions');
            container.innerHTML = '';
            
            normalizedCatalog
                .filter(i => i.category === activeCategoryKey && i.subcategory.toLowerCase().includes(query))
                .forEach(i => {
                    let div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerText = i.subcategory;
                    div.style.padding = "5px";
                    div.onclick = () => {
                        document.getElementById('subcategory_search').value = i.subcategory;
                        container.style.display = 'none';
                    };
                    container.appendChild(div);
                });
            container.style.display = 'block';
        }

        function processComponentIntent() {
            const sub = document.getElementById('subcategory_search').value;
            const item = normalizedCatalog.find(i => i.subcategory === sub);
            if (item) {
                alert("Selected: " + item.subcategory + " | Avg Mat: $" + item.avg_mat);
            } else {
                alert("Please select a valid item from the dropdown.");
            }
        }
    </script>
</body>
</html>
