<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CostPredict MVP | Professional Estimator</title>
    <style>
        /* CostPredict Brand Colors */
        :root {
            --cp-blue: #23408A;
            --cp-yellow: #FFC113;
            --cp-light-bg: #f8fafc;
            --cp-text: #1e293b;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--cp-light-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: var(--cp-text);
        }

        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(35, 64, 138, 0.1); 
            width: 100%; 
            max-width: 450px; 
            border-top: 10px solid var(--cp-blue); 
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: var(--cp-blue);
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .logo-text span {
            color: var(--cp-yellow);
        }

        .tagline {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        h2 { 
            font-size: 18px;
            margin: 0 0 20px 0;
            text-align: center;
            color: var(--cp-blue);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            font-size: 0.85rem; 
            color: #475569;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--cp-blue);
            box-shadow: 0 0 0 3px rgba(35, 64, 138, 0.1);
        }

        button { 
            width: 100%; 
            background: var(--cp-blue); 
            color: white; 
            border: none; 
            padding: 16px; 
            margin-top: 20px; 
            border-radius: 6px; 
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer; 
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover { 
            background: #1a3069; 
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(35, 64, 138, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 25px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-area">
            <div class="logo-text">COST<span>PREDICT</span></div>
            <div class="tagline">Predictive Pricing MVP</div>
        </div>

        <form action="/generate" method="post">
            <div class="form-group">
                <label>Project Description</label>
                <input type="text" name="name" placeholder="e.g. Living Room LVP Install" required>
            </div>
            
            <div class="form-group">
                <label>Total Square Footage</label>
                <input type="number" name="sq_ft" placeholder="e.g. 1200" required>
            </div>
            
            <div class="form-group">
                <label>Material Price ($ per SF)</label>
                <input type="number" step="0.01" name="mat_rate" placeholder="3.50" required>
            </div>
            
            <div class="form-group">
                <label>Labor Price ($ per SF)</label>
                <input type="number" step="0.01" name="lab_rate" placeholder="2.25" required>
            </div>
            
            <button type="submit">Generate PDF Report</button>
        </form>

        <div class="footer-note">
            Predictive engine calculates incidentals and waste factors automatically.<br>
            Powered by CostPredict Logic © 2026
        </div>
    </div>
</body>
</html>
