name: Monthly AI Pricing Enrichment Pipeline

on:
  schedule:
    # Fires at midnight every Sunday, every 14 days
    - cron: '0 0 */14 * *'
  workflow_dispatch: 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Project Requirements
        run: |
          pip install pandas google-genai
          # If you add scraping later, add playwright/requests here

      - name: Execute Pricing Generation Engine
        run: python enrich_prices.py

      - name: Commit and Push Updated Pricing Array back to Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Add all csv files in the data directory
          git add data/*.csv
          
          # Check for changes and commit
          if ! git diff --quiet --staged; then
            git commit -m "Chore: Automated monthly pricing sync [Skip CI]"
            git push
          else
            echo "No changes detected to commit."
          fi
