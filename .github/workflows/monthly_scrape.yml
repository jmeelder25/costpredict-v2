name: Monthly Pricing Scrape

on:
  workflow_dispatch:
    inputs:
      cat:
        description: 'Category (Folder Name)'
        required: true
      sub:
        description: 'Subcategory (File Name)'
        required: true
      zip:
        description: 'Zip Code'
        required: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pandas requests
      - name: Run Scraper
        env:
          CATEGORY: ${{ github.event.inputs.cat }}
          SUBCATEGORY: ${{ github.event.inputs.sub }}
          ZIP: ${{ github.event.inputs.zip }}
        run: python scripts/scrape_engine.py
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/
          git commit -m "Update pricing for $CATEGORY/$SUBCATEGORY"
          git push
