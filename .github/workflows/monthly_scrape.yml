name: Monthly AI Pricing Enrichment Pipeline

on:
  schedule:
    - cron: '0 0 */14 * *'
  workflow_dispatch: 

jobs:
  process-category:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        category: [
          "Baseboard", "Bathtubs and Showers", "Builders Hardware", "Cabinets", 
          "Ceilings", "Columns", "Concrete and Cement and Masonry", "Countertops", 
          "Decking", "Doors", "Drywall", "Erosion Control", "Fans", "Fasteners", 
          "Faucets", "Fencing and Gates", "Flooring", "Glass and Acrylic", "Gutters", 
          "Insulation", "Jack Posts", "Ladders", "Lumber and Composites", 
          "Material Handling Equipment", "Metals", "Mirrors", "Molding", "Paint", 
          "Roofing", "Scaffolding", "Siding and Stone Veneer", "Sinks", 
          "Stairs and Railings", "Toilets", "Tools", "Vanities", "Ventilation", "Windows"
        ]
        zip: ["60601"] 
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CURRENT_CATEGORY: ${{ matrix.category }}
      TARGET_ZIP: ${{ matrix.zip }}
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pandas google-genai
      - run: python enrich_prices.py
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add "data/${{ matrix.zip }}/${{ matrix.category }}.csv"
          git diff --quiet --staged || (git commit -m "Update ${{ matrix.category }} for ${{ matrix.zip }}" && git push)
