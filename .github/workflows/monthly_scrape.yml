name: On-Demand Pricing Enrichment

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Construction Category'
        required: true
      zip_code:
        description: 'Zip Code'
        required: true

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pandas google-genai
      - run: python enrich_prices.py ${{ github.event.inputs.category }} ${{ github.event.inputs.zip_code }}
      
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git pull --rebase origin main
          git add "data/${{ github.event.inputs.zip_code }}/${{ github.event.inputs.category }}.csv"
          git commit -m "Add pricing for ${{ github.event.inputs.category }} in ${{ github.event.inputs.zip_code }}"
          git push
